name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install ruff pytest pytest-asyncio httpx
          pip install -r checker/api/requirements.txt
          pip install -r collector/api/requirements.txt
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest
        env:
          PYTHONPATH: ${{ github.workspace }}
          CORS_ORIGINS: "http://localhost:3000"

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check no secrets in tracked files
        run: |
          if grep -rE "(SECRET|PASSWORD|API_KEY|PRIVATE_KEY)\s*=\s*['\"][^'\"]{8,}" \
            --include="*.py" --include="*.ts" --include="*.tsx" --include="*.js" .; then
            echo "Possible secret found"; exit 1
          fi

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
