version: "3.9"

services:
  checker:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - AGENTS_PATH=/app/data/ai-agents.json
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
      - LOG_LEVEL=INFO
    restart: unless-stopped

  collector:
    build:
      context: .
      dockerfile: collector/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=sqlite:////data/truetraffic.db
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
      - LOG_LEVEL=INFO
    volumes:
      - collector-data:/data
    restart: unless-stopped

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
        - VITE_COLLECTOR_URL=http://localhost:8001
    ports:
      - "3000:80"
    depends_on:
      - collector
    restart: unless-stopped

volumes:
  collector-data:
